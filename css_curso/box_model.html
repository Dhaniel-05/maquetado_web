<head>

    <title>Modelos de Caja (Box Model)</title>
    <link rel="stylesheet" href="box_model.css">
</head>
<body>
    <!-- 
    Box Model significa Modelo de Caja, es un concepto fundamental en CSS que describe cómo se calculan las dimensiones y el espacio ocupado por los elementos en una página web. Cada elemento HTML se representa como una caja rectangular que consta de cuatro partes principales:
    1. Contenido (content): Es el área donde se muestra el contenido del elemento.
    2. Relleno (padding): Es el espacio entre el contenido y el borde.
    3. Borde (border): Es la línea que rodea la caja.
    4. Margen (margin): Es el espacio entre la caja y los elementos vecinos.
    El modelo de caja es esencial para entender cómo se distribuyen los elementos en una página web y cómo se pueden controlar sus dimensiones y espacios. Al ajustar el padding, border y margin, los desarrolladores pueden crear diseños más precisos y atractivos.
    -->

</body>
</html>
